          <h1>Microeconomics Games</h1>
          <p>AI-alapú interaktív mikroökonómia játékok és tanulási platform. Játssz, tanulj, vizsgázz magabiztosan.</p>
          <p><strong>Szerző:</strong> Oroján Sándor, egyetemi oktató, Nyíregyházi Egyetem | <strong>Ingyenes</strong>, regisztráció nélkül játszható | Kétnyelvű: Magyar és English</p>

          <h2>Mi a Microeconomics Games?</h2>
          <p>A Microeconomics Games egy innovatív oktatási platform, amely a mikroökonómia tanulását interaktív, mesterséges intelligencia által támogatott játékok segítségével teszi élményszerűvé. A rendszer célja, hogy a hagyományos tananyagokat modern technológiai eszközökkel egészítse ki.</p>

          <h2>Elérhető játékok</h2>

          <h3>Monopólium (4 szint)</h3>
          <ul>
            <li><strong>1. szint – Monopólium alapjai:</strong> Vásárlói fizetési hajlandóság, optimális ár és mennyiség meghatározása, fogyasztói és termelői többlet, holtteher-veszteség</li>
            <li><strong>2. szint – Árdiszkrimináció:</strong> Első-, másod- és harmadfokú árdiszkrimináció, tökéletes árdiszkrimináció</li>
            <li><strong>3. szint – Oligopólium:</strong> Cournot-egyensúly, Bertrand-verseny, Stackelberg-modell, kartellek</li>
            <li><strong>4. szint – Árszabályozás:</strong> Természetes monopólium, árplafon, árpadló, AC-alapú szabályozás</li>
          </ul>

          <h3>Kereslet és kínálat (4 szint)</h3>
          <p>Piaci egyensúly, áreltolódások, fogyasztói és termelői döntések, adók és támogatások hatásai.</p>

          <h3>Vállalati költségek (4 szint)</h3>
          <p>Fix és változó költségek, határköltség, átlagköltség, hosszú távú költségfüggvények.</p>

          <h3>Költségvetési korlát és fogyasztói választás (4 szint)</h3>
          <p>Hasznosság maximalizálás, közömbösségi görbék, helyettesítési hatás, jövedelemhatás.</p>

          <h3>Rugalmasság (4 szint)</h3>
          <p>Kereslet és kínálat árrugalmassága, keresztrugalmasság, jövedelmi rugalmasság.</p>

          <h2>Miért érdemes használni?</h2>
          <ul>
            <li><strong>Játékos tanulás (Productive failure):</strong> A játékok először rávezetnek a problémára, aztán leplezik le a megoldást. Mélyebb megértés, mint az előadásos oktatás.</li>
            <li><strong>AI-tutor, aki mindig ráér:</strong> Szókratészi módszerrel kérdező Claude AI-coach minden szinten, magyarul és angolul, bármikor.</li>
            <li><strong>Valós példák, valódi számok:</strong> EpiPen-botrány, EU gázár-plafon, App Store monopóliuma — determinisztikus közgazdasági motorból számolt pontos értékek.</li>
          </ul>

          <h2>Technológia</h2>
          <p>Determinisztikus TypeScript közgazdasági motor (kereslet, MR, MC, DWL, CS, PS), Claude AI tutor (Anthropic), React + Vite frontend, Netlify + Supabase backend.</p>

          <h2>Szerzőről</h2>
          <p>Oroján Sándor a Nyíregyházi Egyetem oktatója, szenvedélye a mikro- és makroökonómia oktatása. A platformot szabad idejében fejlesztette.</p>
